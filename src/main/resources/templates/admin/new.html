<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <span class="navbar-brand mb-0 h1">
        <b th:text="${currentUser.email}">admin@mail.ru</b>
        <span>with roles:</span>
        <span th:each="role : ${currentUser.roles}"
              th:text="${#strings.replace(role.name, 'ROLE_', '') + ' '}">
        </span>
    </span>

    <form th:action="@{/logout}" method="post" class="form-inline">
        <button type="submit" class="btn btn-link text-secondary text-decoration-none">
            Logout
        </button>
    </form>
</nav>

<div class="container-fluid">
    <div class="row">

        <div class="col-2 px-0 pt-3 bg-white min-vh-100">
            <div class="nav flex-column nav-pills">
                <a class="nav-link active" th:href="@{/admin}">Admin</a>
                <a class="nav-link" th:href="@{/user}">User</a>
            </div>
        </div>

        <div class="col-10 bg-light min-vh-100 pt-4">
            <h1 class="mb-4">Admin panel</h1>

            <ul class="nav nav-tabs">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin}">Users table</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/admin/new}">New User</a>
                </li>
            </ul>

            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">Add new user</h4>
                </div>

                <div class="card-body bg-white">
                    <form th:action="@{/admin}"
                          method="post"
                          th:object="${newUser}"
                          class="mx-auto"
                          style="max-width: 350px;">

                        <div class="form-group text-center">
                            <label for="name" class="font-weight-bold">First name</label>
                            <input type="text"
                                   class="form-control"
                                   id="name"
                                   th:field="*{name}">
                        </div>

                        <div class="form-group text-center">
                            <label for="age" class="font-weight-bold">Age</label>
                            <input type="number"
                                   class="form-control"
                                   id="age"
                                   th:field="*{age}">
                        </div>

                        <div class="form-group text-center">
                            <label for="email" class="font-weight-bold">Email</label>
                            <input type="text"
                                   class="form-control"
                                   id="email"
                                   th:field="*{email}">
                        </div>

                        <div class="form-group text-center">
                            <label for="password" class="font-weight-bold">Password</label>
                            <input type="password"
                                   class="form-control"
                                   id="password"
                                   th:field="*{password}">
                        </div>

                        <div class="form-group text-center">
                            <label for="roles" class="font-weight-bold">Role</label>
                            <select id="roles"
                                    class="form-control"
                                    name="roleIds"
                                    multiple
                                    size="2">
                                <option th:each="role : ${roles}"
                                        th:value="${role.id}"
                                        th:text="${#strings.replace(role.name, 'ROLE_', '')}">
                                </option>
                            </select>
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-success btn-lg">
                                Add new user
                            </button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
