<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <span class="navbar-brand mb-0 h1">
        <b th:text="${currentUser.email}">admin@mail.ru</b>
        <span>with roles:</span>
        <span th:each="role : ${currentUser.roles}"
              th:text="${#strings.replace(role.name, 'ROLE_', '') + ' '}">
        </span>
    </span>

    <form th:action="@{/logout}" method="post" class="form-inline">
        <button type="submit" class="btn btn-link text-secondary text-decoration-none">
            Logout
        </button>
    </form>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-2 px-0 pt-3 bg-white min-vh-100">
            <div class="nav flex-column nav-pills">
                <a class="nav-link active" th:href="@{/admin}">Admin</a>
                <a class="nav-link" th:href="@{/user}">User</a>
            </div>
        </div>

        <!-- Main content -->
        <div class="col-10 bg-light min-vh-100 pt-4">
            <h1 class="mb-4">Admin panel</h1>

            <!-- Tabs -->
            <ul class="nav nav-tabs" id="adminTabs" role="tablist">
                <li class="nav-item">
                    <a class="nav-link active"
                       id="users-table-tab"
                       data-toggle="tab"
                       href="#users-table"
                       role="tab">
                        Users table
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       id="new-user-tab"
                       data-toggle="tab"
                       href="#new-user"
                       role="tab">
                        New User
                    </a>
                </li>
            </ul>

            <div class="tab-content">

                <!-- Users table tab -->
                <div class="tab-pane fade show active"
                     id="users-table"
                     role="tabpanel">

                    <div class="card">
                        <div class="card-header">
                            <h4 class="mb-0">All users</h4>
                        </div>

                        <div class="card-body bg-white">
                            <table class="table table-striped">
                                <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>First Name</th>
                                    <th>Age</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Edit</th>
                                    <th>Delete</th>
                                </tr>
                                </thead>

                                <tbody>
                                <tr th:each="user : ${users}">
                                    <td th:text="${user.id}"></td>
                                    <td th:text="${user.name}"></td>
                                    <td th:text="${user.age}"></td>
                                    <td th:text="${user.email}"></td>
                                    <td>
                                        <span th:each="role : ${user.roles}"
                                              th:text="${#strings.replace(role.name, 'ROLE_', '') + ' '}">
                                        </span>
                                    </td>

                                    <!-- Edit button + modal -->
                                    <td>
                                        <button type="button"
                                                class="btn btn-info"
                                                data-toggle="modal"
                                                th:data-target="${'#editModal' + user.id}">
                                            Edit
                                        </button>

                                        <div class="modal fade"
                                             th:id="${'editModal' + user.id}"
                                             tabindex="-1"
                                             role="dialog"
                                             aria-hidden="true">

                                            <div class="modal-dialog" role="document">
                                                <div class="modal-content">

                                                    <form th:action="@{/admin/{userId}(userId=${user.id})}"
                                                          method="post">

                                                        <input type="hidden" name="_method" value="patch">

                                                        <div class="modal-header">
                                                            <h5 class="modal-title">Edit user</h5>
                                                            <button type="button"
                                                                    class="close"
                                                                    data-dismiss="modal"
                                                                    aria-label="Close">
                                                                <span aria-hidden="true">&times;</span>
                                                            </button>
                                                        </div>

                                                        <div class="modal-body">

                                                            <div class="form-group text-center">
                                                                <label class="font-weight-bold">ID</label>
                                                                <input type="text"
                                                                       class="form-control mx-auto"
                                                                       style="max-width: 250px;"
                                                                       th:value="${user.id}"
                                                                       disabled>
                                                            </div>

                                                            <div class="form-group text-center">
                                                                <label class="font-weight-bold">First name</label>
                                                                <input type="text"
                                                                       class="form-control mx-auto"
                                                                       style="max-width: 250px;"
                                                                       name="name"
                                                                       th:value="${user.name}">
                                                            </div>

                                                            <div class="form-group text-center">
                                                                <label class="font-weight-bold">Age</label>
                                                                <input type="number"
                                                                       class="form-control mx-auto"
                                                                       style="max-width: 250px;"
                                                                       name="age"
                                                                       th:value="${user.age}">
                                                            </div>

                                                            <div class="form-group text-center">
                                                                <label class="font-weight-bold">Email</label>
                                                                <input type="text"
                                                                       class="form-control mx-auto"
                                                                       style="max-width: 250px;"
                                                                       name="email"
                                                                       th:value="${user.email}">
                                                            </div>

                                                            <div class="form-group text-center">
                                                                <label class="font-weight-bold">Password</label>
                                                                <input type="password"
                                                                       class="form-control mx-auto"
                                                                       style="max-width: 250px;"
                                                                       name="password">
                                                            </div>

                                                            <div class="form-group text-center">
                                                                <label class="font-weight-bold">Role</label>
                                                                <select class="form-control mx-auto"
                                                                        style="max-width: 250px;"
                                                                        name="roleIds"
                                                                        multiple
                                                                        size="2">
                                                                    <option th:each="role : ${roles}"
                                                                            th:value="${role.id}"
                                                                            th:text="${#strings.replace(role.name, 'ROLE_', '')}"
                                                                            th:selected="${user.roles.contains(role)}">
                                                                    </option>
                                                                </select>
                                                            </div>

                                                        </div>

                                                        <div class="modal-footer">
                                                            <button type="button"
                                                                    class="btn btn-secondary"
                                                                    data-dismiss="modal">
                                                                Close
                                                            </button>

                                                            <button type="submit"
                                                                    class="btn btn-primary">
                                                                Edit
                                                            </button>
                                                        </div>

                                                    </form>

                                                </div>
                                            </div>
                                        </div>
                                    </td>

                                    <!-- Delete button + modal -->
                                    <td>
                                        <button type="button"
                                                class="btn btn-danger"
                                                data-toggle="modal"
                                                th:data-target="${'#deleteModal' + user.id}">
                                            Delete
                                        </button>

                                        <div class="modal fade"
                                             th:id="${'deleteModal' + user.id}"
                                             tabindex="-1"
                                             role="dialog"
                                             aria-hidden="true">

                                            <div class="modal-dialog" role="document">
                                                <div class="modal-content">

                                                    <form th:action="@{/admin/{userId}(userId=${user.id})}"
                                                          method="post">

                                                        <input type="hidden" name="_method" value="delete">

                                                        <div class="modal-header">
                                                            <h5 class="modal-title">Delete user</h5>
                                                            <button type="button"
                                                                    class="close"
                                                                    data-dismiss="modal"
                                                                    aria-label="Close">
                                                                <span aria-hidden="true">&times;</span>
                                                            </button>
                                                        </div>

                                                        <div class="modal-body">

                                                            <div class="form-group text-center">
                                                                <label class="font-weight-bold">ID</label>
                                                                <input type="text"
                                                                       class="form-control mx-auto"
                                                                       style="max-width: 250px;"
                                                                       th:value="${user.id}"
                                                                       disabled>
                                                            </div>

                                                            <div class="form-group text-center">
                                                                <label class="font-weight-bold">First name</label>
                                                                <input type="text"
                                                                       class="form-control mx-auto"
                                                                       style="max-width: 250px;"
                                                                       th:value="${user.name}"
                                                                       disabled>
                                                            </div>

                                                            <div class="form-group text-center">
                                                                <label class="font-weight-bold">Age</label>
                                                                <input type="number"
                                                                       class="form-control mx-auto"
                                                                       style="max-width: 250px;"
                                                                       th:value="${user.age}"
                                                                       disabled>
                                                            </div>

                                                            <div class="form-group text-center">
                                                                <label class="font-weight-bold">Email</label>
                                                                <input type="text"
                                                                       class="form-control mx-auto"
                                                                       style="max-width: 250px;"
                                                                       th:value="${user.email}"
                                                                       disabled>
                                                            </div>

                                                            <div class="form-group text-center">
                                                                <label class="font-weight-bold">Role</label>
                                                                <select class="form-control mx-auto"
                                                                        style="max-width: 250px;"
                                                                        multiple
                                                                        size="2"
                                                                        disabled>
                                                                    <option th:each="role : ${user.roles}"
                                                                            th:text="${#strings.replace(role.name, 'ROLE_', '')}">
                                                                    </option>
                                                                </select>
                                                            </div>

                                                        </div>

                                                        <div class="modal-footer">
                                                            <button type="button"
                                                                    class="btn btn-secondary"
                                                                    data-dismiss="modal">
                                                                Close
                                                            </button>

                                                            <button type="submit"
                                                                    class="btn btn-danger">
                                                                Delete
                                                            </button>
                                                        </div>

                                                    </form>

                                                </div>
                                            </div>
                                        </div>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- New user tab -->
                <div class="tab-pane fade"
                     id="new-user"
                     role="tabpanel">

                    <div class="card">
                        <div class="card-header">
                            <h4 class="mb-0">Add new user</h4>
                        </div>

                        <div class="card-body bg-white">
                            <form th:action="@{/admin}"
                                  method="post"
                                  th:object="${newUser}"
                                  class="mx-auto"
                                  style="max-width: 350px;">

                                <div class="form-group text-center">
                                    <label for="name" class="font-weight-bold">First name</label>
                                    <input type="text"
                                           class="form-control"
                                           id="name"
                                           th:field="*{name}">
                                </div>

                                <div class="form-group text-center">
                                    <label for="age" class="font-weight-bold">Age</label>
                                    <input type="number"
                                           class="form-control"
                                           id="age"
                                           th:field="*{age}">
                                </div>

                                <div class="form-group text-center">
                                    <label for="email" class="font-weight-bold">Email</label>
                                    <input type="text"
                                           class="form-control"
                                           id="email"
                                           th:field="*{email}">
                                </div>

                                <div class="form-group text-center">
                                    <label for="password" class="font-weight-bold">Password</label>
                                    <input type="password"
                                           class="form-control"
                                           id="password"
                                           th:field="*{password}">
                                </div>

                                <div class="form-group text-center">
                                    <label for="roles" class="font-weight-bold">Role</label>
                                    <select id="roles"
                                            class="form-control"
                                            name="roleIds"
                                            multiple
                                            size="2">
                                        <option th:each="role : ${roles}"
                                                th:value="${role.id}"
                                                th:text="${#strings.replace(role.name, 'ROLE_', '')}">
                                        </option>
                                    </select>
                                </div>

                                <div class="text-center">
                                    <button type="submit" class="btn btn-success btn-lg">
                                        Add new user
                                    </button>
                                </div>

                            </form>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
