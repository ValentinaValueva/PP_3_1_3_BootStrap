<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-text text-white">
        <strong th:text="${user.email}">user@mail.ru</strong>
        <span> with roles: </span>
        <span th:each="role : ${user.roles}"
              th:text="${#strings.replace(role.name, 'ROLE_', '') + ' '}">USER</span>
    </span>
    <form th:action="@{/logout}" method="post" class="mb-0">
        <button class="btn btn-link text-secondary text-decoration-none" type="submit">Logout</button>
    </form>
</nav>

<div class="container-fluid">
    <div class="row">
        <nav class="col-2 bg-white min-vh-100 pt-3 px-0">
            <div class="nav flex-column nav-pills">
                <a class="nav-link active rounded-0" th:href="@{/user}">User</a>
            </div>
        </nav>

        <main class="col-10 pt-4 px-4">
            <h1 class="display-4 font-weight-normal mb-3">User information-page</h1>
            <div class="card">
                <div class="card-header bg-white">
                    <h4 class="mb-0">About user</h4>
                </div>
                <div class="card-body">
                    <table class="table table-striped mb-0">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Age</th>
                            <th>Email</th>
                            <th>Role</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr>
                            <td th:text="${user.id}">1</td>
                            <td th:text="${user.name}">user</td>
                            <td th:text="${user.age}">30</td>
                            <td th:text="${user.email}">user@mail.ru</td>
                            <td>
                                <span th:each="role : ${user.roles}"
                                      th:text="${#strings.replace(role.name, 'ROLE_', '') + ' '}">USER</span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>
</body>
</html>
